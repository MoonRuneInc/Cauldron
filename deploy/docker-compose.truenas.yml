# RuneChat — TrueNAS SCALE Docker Compose (VM deployment)
#
# Place this file, .env.prod, and nginx/prod.conf on the TrueNAS host,
# then run: docker compose -f docker-compose.truenas.yml up -d
#
# For TrueNAS Custom Apps (24.04+), use docker-compose.truenas-custom-app.yml
# instead, which references pre-built images.

services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  proxy:
    image: nginx:1.30-alpine-slim
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ../nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
